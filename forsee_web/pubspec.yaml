name: forsee_web
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Fonts
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5

  # Google Sign-In (web)
  google_sign_in: ^6.2.2

  # HTTP for ML API calls
  http: ^1.3.0

  # State management
  provider: ^6.1.2

  # Web-friendly routing
  go_router: ^15.1.2

  # Charts for dashboards
  fl_chart: ^0.70.2

  # CSV upload
  file_picker: ^8.0.0
  csv: ^6.0.0

  # Date formatting
  intl: ^0.20.2

  # Progress indicators
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Added to link your background image
  assets:
    - assets/landing_page.png
    - assets/background_solid.png
    - assets/admin_ill.png
    - assets/teacher_ill.png
    - assets/student_ill.png
    - assets/signup_background.png